<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SewReady — Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css">
  <link rel="manifest" href="../../manifest.json">
  <meta name="theme-color" content="#a855f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>
      <div class="brand">
        <span class="brand-icon">&#9986;</span>
        <span class="brand-name">SewReady</span>
      </div>
    </div>
    <div class="header-center">
      <span class="shop-name">Shop Admin</span>
    </div>
    <div class="header-right">
      <button class="cust-lang-toggle" id="langToggle" onclick="toggleLanguage()" title="Switch language">EN | 한</button>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <span class="nav-icon">&#9632;</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="incoming.html" class="nav-item">
          <span class="nav-icon">&#128229;</span>
          <span class="nav-label">Incoming</span>
        </a>
        <a href="orders.html" class="nav-item">
          <span class="nav-icon">&#128203;</span>
          <span class="nav-label">Orders</span>
        </a>
        <a href="services.html" class="nav-item">
          <span class="nav-icon">&#9997;</span>
          <span class="nav-label">Services</span>
        </a>
        <a href="inventory.html" class="nav-item">
          <span class="nav-icon">&#128230;</span>
          <span class="nav-label">Inventory</span>
        </a>
        <a href="sop-library.html" class="nav-item">
          <span class="nav-icon">&#128214;</span>
          <span class="nav-label">SOP Library</span>
        </a>
        <a href="calendar.html" class="nav-item">
          <span class="nav-icon">&#128197;</span>
          <span class="nav-label">Calendar</span>
        </a>
        <a href="analytics.html" class="nav-item active">
          <span class="nav-icon">&#128200;</span>
          <span class="nav-label" data-i18n="admin.analytics">Analytics</span>
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">&#9881;</span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="dash-welcome">
        <div>
          <h1 class="dash-greeting" data-i18n="admin.analyticsTitle">Analytics Dashboard</h1>
          <p class="dash-date" id="dateRange"></p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="date" id="startDate" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(240,232,220,0.1);background:rgba(240,232,220,0.06);color:#f0e8dc;font-size:13px">
          <span style="color:rgba(240,232,220,0.5)">to</span>
          <input type="date" id="endDate" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(240,232,220,0.1);background:rgba(240,232,220,0.06);color:#f0e8dc;font-size:13px">
          <button id="refreshBtn" class="btn-primary" style="padding:6px 16px;font-size:13px">Refresh</button>
        </div>
      </div>

      <!-- Stats Row -->
      <section class="dash-stats">
        <div class="dash-stat stat-new">
          <div class="dash-stat-icon">&#128203;</div>
          <div class="dash-stat-info">
            <div class="dash-stat-number" id="statOrdersToday">0</div>
            <div class="dash-stat-label" data-i18n="admin.ordersToday">Orders Today</div>
          </div>
        </div>
        <div class="dash-stat stat-progress">
          <div class="dash-stat-icon">&#128176;</div>
          <div class="dash-stat-info">
            <div class="dash-stat-number" id="statRevenue">$0</div>
            <div class="dash-stat-label" data-i18n="admin.revenueRange">Revenue (Range)</div>
          </div>
        </div>
        <div class="dash-stat stat-ready">
          <div class="dash-stat-icon">&#128178;</div>
          <div class="dash-stat-info">
            <div class="dash-stat-number" id="statAvgValue">$0</div>
            <div class="dash-stat-label" data-i18n="admin.avgOrderValue">Avg Order Value</div>
          </div>
        </div>
        <div class="dash-stat stat-completed">
          <div class="dash-stat-icon">&#9733;</div>
          <div class="dash-stat-info">
            <div class="dash-stat-number" id="statTotalOrders">0</div>
            <div class="dash-stat-label" data-i18n="admin.totalOrdersRange">Total Orders (Range)</div>
          </div>
        </div>
      </section>

      <!-- Charts Row -->
      <div class="dash-two-col">
        <section class="dash-section">
          <h2 class="dash-section-title" data-i18n="admin.ordersPerDay">Orders Per Day</h2>
          <canvas id="ordersChart" width="500" height="250" style="width:100%;max-height:250px"></canvas>
        </section>
        <section class="dash-section">
          <h2 class="dash-section-title" data-i18n="admin.revenuePerDay">Revenue Per Day</h2>
          <canvas id="revenueChart" width="500" height="250" style="width:100%;max-height:250px"></canvas>
        </section>
      </div>

      <div class="dash-two-col">
        <section class="dash-section">
          <h2 class="dash-section-title" data-i18n="admin.ordersByStatus">Orders by Status</h2>
          <canvas id="statusChart" width="300" height="250" style="width:100%;max-height:250px"></canvas>
        </section>
        <section class="dash-section">
          <h2 class="dash-section-title" data-i18n="admin.topServices">Top Services</h2>
          <canvas id="servicesChart" width="500" height="250" style="width:100%;max-height:250px"></canvas>
        </section>
      </div>

    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../../translations.js"></script>
  <script src="../../shared-data.js"></script>
  <script src="../../data-store.js"></script>
  <script src="shop-config.js"></script>
  <script src="../../admin-auth.js"></script>
  <script src="../../auth-gate.js"></script>
  <script src="../../analytics.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
