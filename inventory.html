<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SewReady — Inventory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#a855f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>
      <div class="brand">
        <span class="brand-icon">&#9986;</span>
        <span class="brand-name">SewReady</span>
      </div>
    </div>
    <div class="header-center">
      <span class="shop-name">Maria's Alterations</span>
    </div>
    <div class="header-right">
      <button class="cust-lang-toggle" id="langToggle" onclick="toggleLanguage()" title="Switch language">EN | 한</button>
      <button class="notif-btn" aria-label="Notifications">
        <span class="notif-icon">&#128276;</span>
        <span class="notif-badge">3</span>
      </button>
      <div class="user-info">
        <span class="user-avatar">M</span>
        <span class="user-name">Maria S.</span>
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">&#9632;</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="incoming.html" class="nav-item">
          <span class="nav-icon">&#128229;</span>
          <span class="nav-label">Incoming</span>
        </a>
        <a href="orders.html" class="nav-item">
          <span class="nav-icon">&#128203;</span>
          <span class="nav-label">Orders</span>
        </a>
        <a href="services.html" class="nav-item">
          <span class="nav-icon">&#9997;</span>
          <span class="nav-label">Services</span>
        </a>
        <a href="inventory.html" class="nav-item active">
          <span class="nav-icon">&#128230;</span>
          <span class="nav-label">Inventory</span>
        </a>
        <a href="sop-library.html" class="nav-item">
          <span class="nav-icon">&#128214;</span>
          <span class="nav-label">SOP Library</span>
        </a>
        <a href="calendar.html" class="nav-item">
          <span class="nav-icon">&#128197;</span>
          <span class="nav-label">Calendar</span>
        </a>
        <a href="analytics.html" class="nav-item">
          <span class="nav-icon">&#128200;</span>
          <span class="nav-label" data-i18n="admin.analytics">Analytics</span>
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">&#9881;</span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="inv-top-bar">
        <div class="inv-top-left">
          <h1 class="page-title">Inventory</h1>
          <span class="inv-count" id="invCount">22 items</span>
        </div>
        <div class="inv-top-right">
          <div class="search-box">
            <span class="search-icon">&#128269;</span>
            <input type="text" id="invSearch" placeholder="Search inventory..." class="search-input">
          </div>
          <select id="catFilter" class="table-filter-select">
            <option value="all">All Categories</option>
          </select>
        </div>
      </div>

      <!-- Stats -->
      <div class="inv-stats" id="invStats"></div>

      <!-- Inventory Grid -->
      <div class="inv-grid" id="invGrid"></div>
    </main>
  </div>

  <script src="translations.js"></script>
  <script src="shared-data.js"></script>
  <script src="inventory-data.js"></script>
  <script src="data-store.js"></script>
  <script src="user-switch.js"></script>
  <script src="inventory.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
