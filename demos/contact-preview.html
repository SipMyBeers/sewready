<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Card Preview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,sans-serif;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.overlay-bg{position:fixed;inset:0;background:rgba(10,10,20,.6)}
.card{position:relative;z-index:1;background:#1e1e2e;border:1px solid rgba(255,255,255,.12);border-radius:16px;width:420px;max-width:92%;padding:0;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.card-top{background:linear-gradient(135deg,#0047a0,#1a1b26);padding:28px 24px 20px;text-align:center}
.card-top h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.card-top p{font-size:13px;color:rgba(255,255,255,.6)}
.card-body{padding:20px 24px}
.info-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px;color:#e1e1e6}
.info-row:last-child{border-bottom:none}
.info-icon{width:38px;height:38px;border-radius:10px;background:rgba(0,71,160,.12);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.info-label{font-size:11px;color:rgba(245,245,245,.5);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.info-value{font-size:14px;color:#e1e1e6;font-weight:500}
.info-value a{color:#4a9eff;text-decoration:none}
.socials{display:flex;gap:12px;justify-content:center;padding:16px 0 4px}
.social-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(245,245,245,.6)}
.card-actions{display:flex;gap:10px;padding:16px 24px 20px}
.action-btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;text-align:center}
.action-primary{background:#0047a0;color:#fff}
.action-secondary{background:rgba(255,255,255,.08);color:#e1e1e6;border:1px solid rgba(255,255,255,.1)}
</style>
</head>
<body>
<div class="overlay-bg"></div>
<div class="card">
  <div class="card-top">
    <h2>AAA Tailor Shop</h2>
    <p>First-class tailoring. A+ service.</p>
  </div>
  <div class="card-body">
    <div class="info-row">
      <div class="info-icon">&#128205;</div>
      <div><div class="info-label">Address</div><div class="info-value">5710 Bragg Blvd, Fayetteville, NC 28303</div></div>
    </div>
    <div class="info-row">
      <div class="info-icon">&#128222;</div>
      <div><div class="info-label">Phone</div><div class="info-value"><a href="#">(910) 555-0129</a></div></div>
    </div>
    <div class="info-row">
      <div class="info-icon">&#9993;</div>
      <div><div class="info-label">Email</div><div class="info-value"><a href="#">al@aaatailor.com</a></div></div>
    </div>
    <div class="socials">
      <div class="social-icon">f</div>
      <div class="social-icon">&#9741;</div>
      <div class="social-icon">G</div>
    </div>
  </div>
  <div class="card-actions">
    <button class="action-btn action-primary">&#128222; Call Now</button>
    <button class="action-btn action-secondary">&#128205; Get Directions</button>
  </div>
</div>
</body>
</html>
